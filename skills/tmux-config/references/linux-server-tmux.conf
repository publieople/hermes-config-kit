# Linux server tmux.conf — Ubuntu 24.04 headless, xsel bridge, tmux 3.4, fish

# 与 wsl-tmux.conf 完全一致，仅剪贴板桥换为 xsel。
# 状态栏位置故意放底部（与本地 WSL 一致），避免多主机切换时肌肉记忆断裂。

# ---------- Prefix ----------
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a send-prefix
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ---------- 鼠标 / 终端 ----------
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g default-shell /usr/bin/fish
set -g focus-events on
set -g escape-time 10

# ---------- 复制 / 粘贴（vi 模式 + xsel） ----------
setw -g mode-keys vi
set -g status-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# tmux → X clipboard（GUI 终端大多读 clipboard selection）
if-shell -b 'command -v xsel >/dev/null' \
  'bind -T copy-mode-vi y send -X copy-selection-and-cancel \; run -b "tmux save-buffer - | xsel --clipboard --input"'

# X clipboard → tmux（prefix + p）
if-shell -b 'command -v xsel >/dev/null' \
  'bind p run -b "xsel --clipboard --output | tmux load-buffer - ; tmux paste-buffer"'

# ---------- 滚动历史 / 索引 ----------
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S:#W:#T"

# ---------- 分屏继承 cwd ----------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ---------- 状态栏（底部） ----------
set -g status-interval 5
set -g status-left-length 32
set -g status-left "#[fg=green,bold] #S #[fg=white]| #h "
set -g status-right "#[fg=cyan]#(whoami)@#H #[fg=white]#[fg=yellow]%Y-%m-%d %H:%M"
set -g status-style "bg=black,fg=white"
set -g window-status-format '#[fg=colour245]#I #W'
set -g window-status-current-format '#[fg=colour255,bold]#I #W'
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=cyan"
set -g message-style "bg=black,fg=yellow"

# ---------- 其他 ----------
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK PATH"
