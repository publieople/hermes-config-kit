# WSL2 tmux.conf — Windows 11 host, fish login shell, tmux 3.7b

# ---------- Prefix ----------
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a send-prefix

# 快速 reload
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ---------- 鼠标 / 终端 ----------
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,tmux-256color:RGB"
set -g default-shell /usr/bin/fish
set -g focus-events on

# ---------- 复制 / 粘贴（vi 模式 + WSL→Windows 剪贴板桥） ----------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# tmux 缓冲区 → Windows 剪贴板
if-shell -b '[ -x /mnt/c/Windows/System32/clip.exe ]' \
  'bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel \; run -b "tmux save-buffer - | /mnt/c/Windows/System32/clip.exe"'

# Windows 剪贴板 → tmux（prefix + p）
if-shell -b '[ -x /mnt/c/Windows/System32/clip.exe ]' \
  'bind p run -b "/mnt/c/Windows/System32/powershell.exe -NoProfile -Command Get-Clipboard | tmux load-buffer - ; tmux paste-buffer"'

# ---------- 滚动历史 / 索引 ----------
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S:#W:#T"

# ---------- 分屏继承 cwd ----------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ---------- 状态栏（底部） ----------
set -g status-interval 5
set -g status-left-length 32
set -g status-left "#[fg=green,bold] #S #[fg=white]| #h "
set -g status-right "#[fg=cyan]#(whoami)@#H #[fg=white]#[fg=yellow]%Y-%m-%d %H:%M"
set -g status-style "bg=black,fg=white"
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=cyan"
set -g message-style "bg=black,fg=yellow"
set -g window-status-format '#[fg=colour245]#I #W'
set -g window-status-current-format '#[fg=colour255,bold]#I #W'

# ---------- 其他 ----------
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK PATH"
