595|# ── Fallback Model ────────────────────────────────────────────────────
596|# Automatic provider failover when primary is unavailable.
597|# Uncomment and configure to enable. Triggers on rate limits (429),
598|# overload (529), service errors (503), or connection failures.
599|#
600|# Supported providers:
601|#   openrouter   (OPENROUTER_API_KEY)  — routes to any model
602|#   openai-codex (OAuth — hermes auth) — OpenAI Codex
603|#   nous         (OAuth — hermes auth) — Nous Portal
604|#   zai          (ZAI_API_KEY)         — Z.AI / GLM
605|#   kimi-coding  (KIMI_API_KEY)        — Kimi / Moonshot
606|#   kimi-coding-cn (KIMI_CN_API_KEY)   — Kimi / Moonshot (China)
607|#   minimax      (MINIMAX_API_KEY)     — MiniMax
608|#   minimax-cn   (MINIMAX_CN_API_KEY)  — MiniMax (China)
609|#   bedrock      (AWS IAM / boto3)     — AWS Bedrock (Converse API)
610|#
611|# For custom OpenAI-compatible endpoints, add base_url and key_env.
612|#
613|# fallback_model:
614|#   provider: openrouter
615|#   model: anthropic/claude-sonnet-4
